id: continuous-governance-code-changed
event: governance.changed.code
description: Run code health governance when source/config code changes.
feature: project-code-health-governance
groups:
  - static
  - evidence
mode: event
strict_audit: true
debounce_seconds: 60
allowed_sources:
  - local
  - git-hook
  - ci-webhook
  - hermes-webhook
  - cron
human_escalation:
  - governance_status_needs_human
  - verifier_failure_after_retry
  - missing_required_evidence
  - destructive_cleanup_requested
