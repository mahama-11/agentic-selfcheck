id: continuous-governance-pitfalls-changed
event: governance.changed.pitfalls
description: Run pitfall feedback gate when pitfall registry changes.
feature: pitfall-feedback-loop
groups:
  - static
  - evidence
mode: event
strict_audit: true
debounce_seconds: 30
allowed_sources:
  - local
  - git-hook
  - ci-webhook
  - hermes-webhook
  - cron
human_escalation:
  - governance_status_needs_human
  - verifier_failure_after_retry
  - missing_required_evidence
  - destructive_cleanup_requested
