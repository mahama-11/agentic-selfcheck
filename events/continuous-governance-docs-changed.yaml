id: continuous-governance-docs-changed
event: governance.changed.docs
description: Run documentation governance when docs/workflows/contracts change.
feature: project-doc-governance
groups:
  - static
  - evidence
mode: event
strict_audit: true
debounce_seconds: 60
allowed_sources:
  - local
  - git-hook
  - ci-webhook
  - hermes-webhook
  - cron
human_escalation:
  - governance_status_needs_human
  - verifier_failure_after_retry
  - missing_required_evidence
  - destructive_cleanup_requested
