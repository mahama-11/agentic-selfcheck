id: github-pr-autonomy
event: github.pull_request
description: Route GitHub pull_request webhook events into the PR autonomy policy dispatcher.
feature: github-pr-autonomy
groups:
  - static
mode: event
strict_audit: true
debounce_seconds: 30
allowed_sources:
  - hermes-webhook
  - ci-webhook
  - local
human_escalation:
  - high_risk_pr
  - invalid_policy
  - unknown_action
  - auto_merge_disabled
