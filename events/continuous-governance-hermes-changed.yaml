id: continuous-governance-hermes-changed
event: governance.changed.hermes
description: Run Hermes/SelfCheck output governance when workflow/reports/features/verifiers/schemas change.
feature: hermes-self-governance
groups:
  - static
  - evidence
mode: event
strict_audit: true
debounce_seconds: 60
allowed_sources:
  - local
  - git-hook
  - ci-webhook
  - hermes-webhook
  - cron
human_escalation:
  - governance_status_needs_human
  - verifier_failure_after_retry
  - missing_required_evidence
  - destructive_cleanup_requested
