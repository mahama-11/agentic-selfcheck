id: continuous-governance-daily-pitfalls
event: governance.watchdog.daily
description: Daily fallback for pitfall feedback loop governance.
feature: pitfall-feedback-loop
groups:
  - static
  - evidence
mode: watchdog
strict_audit: true
debounce_seconds: 3600
allowed_sources:
  - local
  - git-hook
  - ci-webhook
  - hermes-webhook
  - cron
human_escalation:
  - governance_status_needs_human
  - verifier_failure_after_retry
  - missing_required_evidence
  - destructive_cleanup_requested
