id: v-continuous-governance-daily-docs
event: v.governance.watchdog.daily
description: Run v-project-doc-governance when V workspace governance event fires.
feature: v-project-doc-governance
groups:
- static
mode: watchdog
strict_audit: true
debounce_seconds: 3600
allowed_sources:
- local
- git-hook
- ci-webhook
- hermes-webhook
- cron
human_escalation:
- governance_status_needs_human
- verifier_failure_after_retry
- destructive_cleanup_requested
