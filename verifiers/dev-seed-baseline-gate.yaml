kind: api
description: "Verify local dev baseline seeds: platform admin/access rows and ecommerce business template fixtures."
command: "scripts/project_api_smoke.sh {project.id} {feature.id}"
requires: [running_backend, running_frontend, local_postgres]
evidence:
