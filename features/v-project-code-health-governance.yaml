id: v-project-code-health-governance
project: v-workspace
description: V workspace code health/dead-code governance
level_target: L4
repair_policy: default-repair-policy
depends_on:
- continuous-governance
must_pass:
  evidence:
  - v-project-code-health-governance-audit
reviewer_gates:
- spec-review
- quality-review
- final-verification
human_required:
- destructive cleanup requires human approval
- large refactor requires human approval
- public contract change requires human approval
- production data or secrets require human approval
evidence_required:
- /root/work/v/reports/project-code-health-governance/audit.json
- /root/work/v/reports/project-code-health-governance/audit.md
risk_dimensions:
- code-health
- v-workspace
governance:
  cadence: event-plus-daily
  target_root: /root/work/v
  destructive_actions: human-required
