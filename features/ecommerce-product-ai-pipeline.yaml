id: ecommerce-product-ai-pipeline
project: v-ecommerce-worktree
description: "First validation sample: Agent Ecommerce product detail AI pipeline user path."
level_target: L3.5
repair_policy: default-repair-policy
depends_on:
  - frontend-runtime
  - ai-generation
  - review-gates
target_services:
  frontend: ecommerce-frontend
  backend: ecommerce-backend
must_pass:
  static:
    - frontend-typecheck
    - frontend-build
  api:
    - api-readiness-smoke
  browser:
    - browser-login-surface-smoke
  evidence:
    - evidence-gate
reviewer_gates:
  - architect
  - spec-review
  - quality-review
  - qa
  - final-verification
human_required:
  - AI Pipeline page information architecture is understandable to a target user.
  - Generated image/listing quality is acceptable for the product promise.
  - Release readiness and business tradeoffs are approved by the product owner.
evidence_required:
  - reports/ecommerce-product-ai-pipeline/frontend-typecheck.json
  - reports/ecommerce-product-ai-pipeline/frontend-build.json
  - reports/ecommerce-product-ai-pipeline/api-readiness-smoke.json
  - reports/ecommerce-product-ai-pipeline/browser-login-surface-smoke.json
  - .hermes/workflows/ecommerce-product-ai-pipeline/01-requirement.md
  - .hermes/workflows/ecommerce-product-ai-pipeline/02-architecture-review.md
  - .hermes/workflows/ecommerce-product-ai-pipeline/05-spec-review-report.md
  - .hermes/workflows/ecommerce-product-ai-pipeline/06-quality-review-report.md
  - .hermes/workflows/ecommerce-product-ai-pipeline/07-qa-report.md
  - .hermes/workflows/ecommerce-product-ai-pipeline/08-final-verification.md
