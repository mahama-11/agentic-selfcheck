id: project-code-health-governance
project: agentic-selfcheck
description: "Project code redundancy, dead-code, garbage artifact, and AI-navigability governance."
level_target: L4
repair_policy: default-repair-policy
depends_on:
  - continuous-governance
must_pass:
  static:
    - project-code-health-governance-audit
  evidence:
    - evidence-gate
reviewer_gates:
  - spec-review
  - quality-review
  - final-verification
human_required:
  - "destructive cleanup requires human approval"
  - "policy/product decisions require human approval"
  - "source module deletion"
  - "interface or behavior changes"
  - "broad refactor"
evidence_required:
  - reports/project-code-health-governance/audit.json
  - reports/project-code-health-governance/audit.md
risk_dimensions:
  - project
governance:
  cadence: weekly
  output_contract: compact-json-and-markdown
  destructive_actions: human-required
